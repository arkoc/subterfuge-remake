<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Subterfuge Remake — sonar scope icon.
       Dark abyss disc, phosphor sweep rings, sub blip heading NE. -->
  <defs>
    <radialGradient id="abyss" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0a1a30"/>
      <stop offset="100%" stop-color="#020812"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#abyss)" stroke="#1f3a5c" stroke-width="2"/>
  <!-- sonar rings -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#7af0c8" stroke-opacity="0.28" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="#7af0c8" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- sweep wedge -->
  <path d="M32 32 L32 4 A28 28 0 0 1 51.8 12.2 Z" fill="#7af0c8" fill-opacity="0.12"/>
  <!-- sub blip: directional arrow hull heading NE -->
  <g transform="translate(40 24) rotate(-45)">
    <path d="M8 0 L-5 -4.5 L-3.2 0 L-5 4.5 Z" fill="#7af0c8"/>
  </g>
  <!-- wake dots trailing SW -->
  <circle cx="30" cy="34" r="1.8" fill="#7af0c8" fill-opacity="0.7"/>
  <circle cx="24" cy="40" r="1.4" fill="#7af0c8" fill-opacity="0.4"/>
  <circle cx="19" cy="45" r="1.1" fill="#7af0c8" fill-opacity="0.2"/>
</svg>
